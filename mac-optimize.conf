# ============================================================================
# mac-optimize.conf — Configuração do toolkit mac-optimization
# ============================================================================
# Este ficheiro é carregado por todos os scripts. Para personalizar sem tocar
# no projeto, copie-o para ~/.mac-optimize.conf (tem prioridade sobre este).
#
# Sintaxe: shell (é carregado com "source"). Não coloque comandos aqui,
# apenas atribuições de variáveis.
# ============================================================================

# --- Limpeza (cleanup-temp.sh) ---------------------------------------------

# Idade mínima (em dias) dos ficheiros de cache a remover em ~/Library/Caches
CACHE_AGE_DAYS=7

# Idade mínima (em dias) dos logs a remover em ~/Library/Logs
LOG_AGE_DAYS=30

# Idade mínima (em dias) dos ficheiros do utilizador a remover em /tmp e /var/tmp
TMP_AGE_DAYS=3

# Idade mínima (em dias) dos downloads incompletos a remover em ~/Downloads
DOWNLOADS_AGE_DAYS=7

# Esvaziar o Lixo durante a limpeza? (yes/no — pede sempre confirmação)
EMPTY_TRASH=yes

# Caches que NUNCA devem ser tocadas (separadas por espaço).
# CloudKit/bird/FileProvider = sincronização iCloud; removê-las força
# re-download de dados e pode causar conflitos de sincronização.
PROTECTED_CACHES="CloudKit com.apple.bird com.apple.FileProvider FamilyCircle com.apple.Safari com.apple.WebKit com.apple.containermanagerd com.apple.iconservices"

# --- Otimização (optimize-mac.sh) -------------------------------------------

# Percentagem mínima de memória livre; abaixo disto é sugerido o "purge"
MEMORY_FREE_THRESHOLD=20

# Serviços de utilizador (LaunchAgents) a desativar, separados por espaço.
# VAZIO por omissão (mais seguro). Tudo o que for desativado fica registado
# e pode ser revertido com: ./optimize-mac.sh --revert
# Exemplos (descomente por sua conta e risco):
#   com.adobe.AdobeCreativeCloud  — arranque automático da Creative Cloud
#   com.microsoft.update.agent    — Microsoft AutoUpdate em segundo plano
SERVICES_TO_DISABLE=""
